<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuksalish Group</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box
        }

        body,
        html {
            overflow-x: hidden;
        }

        body {
            background-color: black;
            color: white
        }

        .icon {
            position: absolute;
            top: 345px;
            left: 33%;
            transform: translateX(-33%);
            object-fit: cover
        }

        .icons {
            position: absolute;
            top: 210px;
            transform: translateX(31%);
            right: 31%;
            object-fit: cover
        }

        .hero {
            padding-bottom: 32px
        }

        .hero__container {
            max-width: 430px;
            margin: 0 auto;
            padding: 0 10px
        }

        .hero__top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding-top: 10px;
            margin-right: 30px
        }

        .hero__top-min {
            margin-top: -18px;
        }

        .hero__top-min p {
            font-family: Montserrat, sans-serif;
            font-weight: 400;
            font-size: 11.5px;
            line-height: 100%;
            color: #D7D7D7;
            white-space: nowrap;
            margin-bottom: 3px
        }

        .hero__top-min h3 {
            font-family: Montserrat, sans-serif;
            font-weight: 700;
            font-size: clamp(13.5px, 3.5vw, 14px);
            line-height: 100%;
            text-align: right;
            text-transform: uppercase
        }

        .hero__top-name {
            margin-top: -20px
        }

        .hero__top-name img {
            object-fit: contain;
            max-width: 166px;
            width: 100%;
        }

        .hero__title {
            font-family: Buyan, sans-serif;
            font-weight: 700;
            font-size: clamp(27.5px, 8.7vw, 38px);
            position: relative;
            z-index: 3;
            line-height: 150%;
            letter-spacing: 2%;
            text-align: center;
            color: white;
            text-transform: uppercase
        }

        .hero__title span {
            color: #FFD600
        }

        .hero__box {
            position: relative;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30
        }

        .hero__images {
            max-width: clamp(218px, 68vw, 258px);
            width: 100%;
            position: relative;
            height: auto;
            z-index: 4
        }

        .hero__btn-box {
            margin-bottom: 17px;
            max-width: 420px;
            width: 100%;
            height: auto;
            position: relative;
            z-index: 25
        }

        .hero__registerBtn {
            text-decoration: none;
            width: 100%;
            border-radius: 12px;
            background: linear-gradient(94.13deg, #FF2C2C 13.8%, #FF5B5B 55.11%, #FF2C2C 83%);
            box-shadow: 0px 4px 0px 0px #FF2323, 0px 2px 3px 1px #FFFFFF40 inset;
            max-width: 388px;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            letter-spacing: 3%;
            font-family: Kuunari, sans-serif;
            padding: 41px 27px;
            font-weight: 700;
            font-size: clamp(19.5px, 6.2vw, 23.5px);
            line-height: 100%;
            text-transform: uppercase;
            color: white;
            margin: 0 auto;
        }

        .text {
            font-family: Montserrat, sans-serif;
            font-weight: 600;
            font-style: Italic;
            font-size: 16px;
            line-height: 130%;
            border-left: 1px solid #FFD600;
            padding-left: 4px;
            margin-bottom: 8px;
            text-align: center;
            position: absolute;
            z-index: 7;
            bottom: 130px;
        }

        .hero__bg {
            position: absolute;
            max-width: 430px;
            width: 100%;
            height: auto;
            top: 150px;
            left: 50%;
            transform: translateX(-50%)
        }

        .hero__bgs {
            position: absolute;
            max-width: 565px;
            width: 100%;
            height: auto;
            top: 210px;
            left: 50%;
            transform: translateX(-50%)
        }

        @media (max-width:400px) {
            .hero__registerBtn {
                padding: 35px 10px;
            }

            .icon {
                left: -15%;
                top: 345px;
            }

            .icons {
                top: 210px;
                right: -16%;
            }
        }

        @media (max-width:340px) {
            .hero__top-name {
                padding: 8px 9px
            }

            .hero__registerBtn {
                padding: 30px 8px;
            }

            .hero__btn-box {
                padding-bottom: 7px
            }

            .hero__top {
                gap: 8px;
                padding-top: 0;
                margin-right: 10px;
            }

            .icon {
                left: -19%;
            }

            .icons {
                right: -23%;
            }
        }
    </style>
    <link rel="stylesheet" href="./css/main.css" media="print" onload="this.media='all'" />
    <noscript>
        <link rel="stylesheet" href="./css/main.css" />
    </noscript>
</head>

<body>

    <main>
        <section class="hero">
            <div style="position: relative;">
                <img class="hero__bg" src="./images/bg.avif" loading="lazy" decoding="async" width="430" height="492"
                    alt="bg">
                <div style="position: relative;">

                    <img class="icon" src="./images/icon1.avif" loading="lazy" decoding="async" width="135" height="83"
                        alt="icons">
                    <img class="icons" src="./images/icon2.avif" loading="lazy" decoding="async" width="128" height="83"
                        alt="icons">
                </div>
            </div>
            <div class="hero__container">
                <div class="hero__top">
                    <div class="hero__top-min">
                        <p>Taqdimot sanasi</p>
                        <h3>31-Mart</h3>
                    </div>

                    <div class="hero__top-name">
                        <img src="./images/logo.avif" loading="lazy" decoding="async" width="166" height="74"
                            alt="logo">
                    </div>

                    <div class="hero__top-min">
                        <p>Vaqti:</p>
                        <h3>20:00</h3>
                    </div>
                </div>

                <h1 class="hero__title">
                    1,5 yilda topshiriladigan <br> xonadonni <span>48 oyga foizsiz</span> <br> bo'lib to'lashga oling
                </h1>


                <div class="hero__box">
                    <img class="hero__images" src="./images/speaker.avif" loading="lazy" decoding="async" width="258"
                        height="305" alt="speaker">


                    <p class="text">Toshkent shahrida <br> Biznes class loyiha</p>

                    <div class="hero__borderWrap" style="position: relative;">

                        <div class="hero__btn-box">
                            <a href="#" class="hero__registerBtn">
                                <img src="./images/cursor.avif" loading="lazy" decoding="async" width="27" height="27"
                                    alt="cursor">
                                taqdimotga ro’yxatdan o’tish
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
